version: "3.8"

services:
  game-server:
    build: .
    ports:
      - "2567:2567"
    environment:
      - PORT=2567
      - NODE_ENV=production
      - ALLOWED_ORIGIN=https://grudge-warlords-3d.vercel.app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2567/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
